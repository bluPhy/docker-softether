name: Build and Wiz Full Scan
permissions:
  contents: read
on:
  push:
    branches: master
    paths:
      - "**.dockerfile"
      - "dockerfile"
      - "Dockerfile"
      - "**.sh"
      - ".github/workflows/image.yml"
jobs:
  build:
    name: Build and scan with Wiz.io
    runs-on: ubuntu-latest
    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
    env:
      TAG: "ajleal/softether:latest" # Set the tag to use for the image
      PLATFORMS: "linux/amd64,linux/arm64,linux/arm/v7" # Set the platforms to build the image for
    steps:
      - name: check out repository
        uses: actions/checkout@v4
      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver: docker-container
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: build image locally
        run: |
          docker buildx build \
            --sbom=true \
            --provenance=true \
            --tag $TAG \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg VERSION=${{ github.run_number }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            .
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      - name: Wiz Full Scan With Default Values # Run both wiz iac and docker scans, and upload the results to Wiz
        uses: aleksei-aikashev/wizcli-wrapper@v1
        with:
          iac_scan_path: "."
          wiz_iac_policy: "Default IaC policy" # IaC scan defaults
          wiz_iac_report_name: "ajleal/softether:latest-${{ github.repository }}-${{ github.run_number }}"
          wiz_iac_tags: "repo=${{ github.repository }},commit_sha=${{ github.sha }},event_name=${{ github.event_name }},github_workflow=${{ github.workflow }}"
          skip_iac_scan: null

          # Docker images vulnerability scan defaults
          docker_scan_path: "."
          wiz_docker_vulnerabilities_policy: "Default vulnerabilities policy"
          wiz_docker_report_name: "ajleal/softether:latest"
          skip_docker_scan: null

          # Common inputs
          wiz_client_id: ${{ secrets.WIZ_CLIENT_ID }}
          wiz_client_secret: ${{ secrets.WIZ_CLIENT_SECRET }}
  Push-to-DockerHub:
    needs: build
    name: Push to DockerHub
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
    env:
      TAG: "ajleal/softether:latest" # Set the tag to use for the image
      PLATFORMS: "linux/amd64,linux/arm64,linux/arm/v7" # Set the platforms to build the image for
    steps:
      - name: check out repository
        uses: actions/checkout@v4
      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver: docker-container
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-dockerhub-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-dockerhub-
            ${{ runner.os }}-buildx-
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build image and push to dockerhub
        if: ${{ success() }}
        run: |
          docker buildx build \
            --push \
            --sbom=true \
            --provenance=true \
            --tag $TAG \
            --platform $PLATFORMS \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg VERSION=${{ github.run_number }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            .
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
  Push-to-Azure-ACR:
    needs: build
    name: Push to Azure ACR
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
    env:
      TAG: "prodmycorpone.azurecr.io/softether:latest" # Set the tag to use for the image
      PLATFORMS: "linux/amd64,linux/arm64,linux/arm/v7" # Set the platforms to build the image for
    steps:
      - name: check out repository
        uses: actions/checkout@v4
      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver: docker-container
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-acr-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-acr-
            ${{ runner.os }}-buildx-
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: prodmycorpone.azurecr.io
          username: ${{ secrets.ACR_PRODMYCORPONE_USER }}
          password: ${{ secrets.ACR_PRODMYCORPONE_PASSWORD }}
      - name: build image and push to Azure ACR
        if: ${{ success() }}
        run: |
          docker buildx build \
            --push \
            --sbom=true \
            --provenance=true \
            --tag $TAG \
            --platform $PLATFORMS \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg VERSION=${{ github.run_number }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            .
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
